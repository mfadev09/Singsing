            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 800px;
            background: linear-gradient(to bottom, var(--electric-blue) 0%, var(--spotify-black) 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 15px 45px rgba(0, 71, 255, 0.3);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;

        .header h1 { font-size: 24px; margin: 0; font-weight: 900; text-transform: uppercase; }
        .header p { font-size: 11px; color: rgba(255, 255, 255, 0.7); margin-top: 5px; letter-spacing: 2px; }

        #list-view { display: flex; flex-direction: column; height: 100%; }

        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .search-box::placeholder { color: rgba(255, 255, 255, 0.6); }
        .search-box:focus { background: rgba(255, 255, 255, 0.3); }

        #song-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        #song-list::-webkit-scrollbar, #lyrics-content::-webkit-scrollbar { width: 5px; }
        #song-list::-webkit-scrollbar-thumb, #lyrics-content::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 10px; 
        }

        .song-item {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }
        .song-item:hover { background: rgba(255, 255, 255, 0.15); }

        .song-item-title { font-size: 16px; font-weight: bold; margin-bottom: 3px; }
        .song-item-artist { font-size: 13px; color: var(--spotify-gray); }

        #lyrics-view {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--spotify-black);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 10;
        }

        #lyrics-view.active { transform: translateX(0); }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
            width: fit-content;
        }

        #active-artist { font-size: 16px; color: var(--spotify-gray); margin: 5px 0 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        #lyrics-content { 
            font-size: 18px; 
            line-height: 1.6; 
            font-weight: 500; 
            white-space: pre-line; 
            overflow-y: auto; 
            flex-grow: 1; 
            padding-right: 10px;

        // Referencias al DOM
        const searchBar = document.getElementById('search-bar');
        const songListContainer = document.getElementById('song-list');
        const lyricsView = document.getElementById('lyrics-view');
        const activeTitle = document.getElementById('active-title');
        const activeArtist = document.getElementById('active-artist');
        const lyricsContent = document.getElementById('lyrics-content');
        const btnBack = document.getElementById('btn-back');

        // Ordenar alfabéticamente
        songs.sort((a, b) => a.t.localeCompare(b.t));

        // Renderizar lista
        function renderList(filterText = "") {
            songListContainer.innerHTML = "";
            const filteredSongs = songs.filter(song => {
                const searchLower = filterText.toLowerCase();
                return song.t.toLowerCase().includes(searchLower) || 
                       song.a.toLowerCase().includes(searchLower);
            });

            if (filteredSongs.length === 0) {
                songListContainer.innerHTML = "<p style='text-align:center; color: #888; margin-top:20px;'>No se encontraron canciones.</p>";
                return;
            }

            filteredSongs.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div class="song-item-title">${song.t}</div>
                    <div class="song-item-artist">${song.a}</div>
                `;
                div.addEventListener('click', () => openLyrics(song));
                songListContainer.appendChild(div);
            });
        }

        // Abrir letra
        function openLyrics(song) {
            activeTitle.innerText = song.t;
            activeArtist.innerText = song.a;
            lyricsContent.innerText = song.l;
            lyricsView.classList.add('active');
            lyricsContent.scrollTop = 0;
            searchBar.blur(); 
        }

        // Volver atrás
        btnBack.addEventListener('click', () => {
            lyricsView.classList.remove('active');
        });

        // Buscador
        searchBar.addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // Iniciar
        renderList();
    </script>
